services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=ChartScope
      - APP_VERSION=0.1.0
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
